# yazi.toml
[mgr]
show_hidden    = true
linemode       = "size_and_mtime"
sort_by        = "natural" # file2 を file10 より前に並べる自然順ソート
sort_sensitive = false     # 並び替えで大文字小文字を区別しない
sort_dir_first = true      # ディレクトリを先頭にまとめる

[preview]
tab_size   = 4    # タブ幅を nvim と揃える
max_width  = 1000 # プレビュー画像の最大解像度
max_height = 1000

[opener]
# エディタは nvim を最優先。無ければ vim、それも無ければ環境標準($EDITOR/vi)に
# 明示的にフォールバックする。
edit = [
    { run = 'if command -v nvim >/dev/null 2>&1; then nvim "$@"; elif command -v vim >/dev/null 2>&1; then vim "$@"; else ${EDITOR:-vi} "$@"; fi', block = true, for = "unix" },
]

# git.yazi: ファイル/ディレクトリの git 状態を取得する fetcher
[[plugin.prepend_fetchers]]
id    = "git"
url   = "*"
run   = "git"
group = "git"
[[plugin.prepend_fetchers]]
id    = "git"
url   = "*/"
run   = "git"
group = "git"
