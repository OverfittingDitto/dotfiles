# ~/.config/tmux/tmux.conf

#======================================================================
# 基本設定 (お好みで調整してください)
#======================================================================

# プレフィックスキーを C-a に変更
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ターミナルの色設定をtmuxに正しく伝える
# Alacritty/WezTermなどモダンなターミナル向けの推奨設定
# set-option -g default-terminal "screen-256color"
# set-option -ga terminal-overrides ",xterm-256color:RGB"
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# マウス関連（デフォルトはOFF）
set-option -g mouse on

# コピーモードをVimライクに
set -g mode-keys vi

set -g set-clipboard on

# yでコピーした内容をシステムクリップボードにもコピーする (OS別コマンド)
#   macOS : pbcopy
#   Linux : xclip (X11) または wl-copy (Wayland)
#   WSL   : clip.exe
# if-shell で OS を見て登録するコマンドを切り替える。
if-shell 'command -v pbcopy >/dev/null' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy" ; \
     bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"'

if-shell 'command -v wl-copy >/dev/null' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy" ; \
     bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"'

if-shell 'command -v xclip >/dev/null' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard" ; \
     bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"'

if-shell 'command -v clip.exe >/dev/null' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe" ; \
     bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip.exe"'

# ペインのインデックスを1から開始
set -g base-index 1
setw -g pane-base-index 1

# ESCキーの遅延をなくす
set -sg escape-time 0

# アプリによるウィンドウ名の上書きを禁止
set -g allow-rename off

# for nvim autoload on tmux
set -g focus-events on

set -g allow-passthrough on

#======================================================================
# status line の設定
#======================================================================

# --- オプション：カスタマイズ (必要# ステータスバー設定
set -g status on
# catppuccin mocha bg color setting
# set -g status-bg "#1e1e2e" # Base
# set -g status-bg black
set -g status-style bg=default
set -g status-fg white
set -g status-interval 5
set -g status-justify centre # クォートなしに変更

# --- Nerd Font アイコン (NERD_FONT で出し分け) -------------------------------
# 既定は ASCII (空) にして Nerd Font の無い環境でも文字化けしないようにする。
# NERD_FONT=1 のときだけアイコンを設定する (zsh が export し tmux が継承)。
set -g @i_mode ""
set -g @i_tmux ""
set -g @i_date ""
set -g @i_time ""
if-shell '[ "$NERD_FONT" = 1 ]' \
  "set -g @i_mode ' ' ; set -g @i_tmux ' ' ; set -g @i_date ' ' ; set -g @i_time ' '"

# 左側：セッション名
set -g status-left-length 100
# set -g status-left " #{?pane_in_mode,#[bg=yellow]  COPY ,#[fg=cyan,bg=default]#{?client_prefix,#[reverse],}  TMUX #[noreverse]}#[bg=default,fg=magenta] #S "
set -g status-left " #{?pane_in_mode,#[bg=yellow]#[fg=black] #{@i_mode}COPY ,#{?client_prefix,#[reverse],#[fg=cyan,bg=default]} #{@i_tmux}TMUX #[noreverse]}#[bg=default,fg=magenta] #S "

# 右側：日付・時刻・ユーザー・ホスト
set -g status-right-length 150
set -g status-right "#[fg=green]#{pane_current_path}  #[fg=cyan]#{@i_date}%Y-%m-%d  #[fg=yellow]#{@i_time}%H:%M  "

# ウィンドウタイトルの区切り無し
set -g window-status-separator ""

# 現在のウィンドウ（強調表示）
set -g window-status-current-format "#[bg=blue,fg=#ffffff,bold] #I:#W #[nobold]"
# set -g window-status-current-format "#[fg=blue,bg=default]#[fg=#1e1e2e,bg=blue,bold] #I:#W #[fg=blue,bg=default,nobold]"

# 非アクティブなウィンドウ
set -g window-status-format "#[bg=default,fg=grey] #I:#W "

# ペインの枠色
set -g pane-border-style fg=black
set -g pane-active-border-style fg=green

# メッセージ表示スタイル
set -g message-style fg=black,bg=yellow

#======================================================================
# キーバインドなど
#======================================================================

# ペインの分割
# bind v split-window -h
# bind s split-window -v
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# ペインの移動をVimライクに
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ペインのリサイズもVimライクに (Ctrlキーを押しながら)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

#======================================================================
# SSH 環境変数の自動管理
#======================================================================

# iPhoneなどSSHクライアントがデタッチ/切断した際にセッション環境をクリア
# (SSH切断もデタッチとして検知されるため、手動nosshは不要になる)
set-hook -g client-detached 'set-environment -u SSH_CONNECTION ; set-environment -u SSH_CLIENT ; set-environment -u SSH_TTY'

#======================================================================
# その他の設定
#======================================================================


# 新規ウィンドウでディレクトリを保持
bind c new-window -c "#{pane_current_path}"

# マウス設定を切り替える
bind m if-shell "tmux show-options -g mouse | grep off" "set-option -g mouse on" "set-option -g mouse off" \; display-message -F "Change Mouse Mode!"

# 設定のリロード
bind r source-file ~/.config/tmux/tmux.conf \; display-message -F "Reloaded!"

# (prefix) gでlazygitを起動する
bind g popup -w90% -h90% -E lazygit
