# Starship prompt config
# Docs: https://starship.rs/config/
# 方針: フラット (背景塗りなし) + Nerd Font アイコン + ターミナルパレット色

"$schema" = 'https://starship.rs/config-schema.json'
add_newline = true

# 1行目: 情報、2行目: プロンプト記号
# 左側を角丸の縦線で連結 (╭─ … ╰─)
format = """
[┏ ](bold white)$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$lua$cmd_duration
[┗━ ](bold white)$character"""

[character]
success_symbol = "[❯](green)"
error_symbol   = "[❯](red)"

[username]
disabled = true

# SSH 時のみホスト名
[hostname]
ssh_only = true
format   = "[󰒍 $hostname ](bright-purple)"

# ディレクトリ (~省略のみ、長くなったら末尾だけ truncate)
[directory]
truncation_length = 5
truncation_symbol = "…/"
truncate_to_repo  = false
home_symbol       = "~"
read_only         = " "
read_only_style   = "red"
format            = "[$path$read_only](cyan bold)"

# Git
[git_branch]
symbol = " "
format = " [$symbol$branch](purple)"

[git_status]
format = " [$all_status$ahead_behind](red)"

# 言語バージョン (検出ファイルがある時のみ表示)
[nodejs]
symbol            = " "
format            = " [$symbol$version](green)"
detect_files      = ["package.json", ".nvmrc", ".node-version"]

[python]
symbol            = " "
format            = " [$symbol$version](yellow)"
detect_files      = ["pyproject.toml", "requirements.txt", "Pipfile", "uv.lock", "setup.py"]
detect_extensions = ["py"]

[rust]
symbol = " "
format = " [$symbol$version](bright-yellow)"

[golang]
symbol = " "
format = " [$symbol$version](cyan)"

[lua]
symbol = " "
format = " [$symbol$version](bright-purple)"

# 重いコマンドの実行時間 (2秒以上のみ)
[cmd_duration]
min_time = 2000
format   = " [⏱ $duration](yellow)"

# 重い/不要モジュールは明示的に無効化
[aws]
disabled = true
[gcloud]
disabled = true
[kubernetes]
disabled = true
[azure]
disabled = true
[terraform]
disabled = true
[package]
disabled = true
